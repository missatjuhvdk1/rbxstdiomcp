# MCPPlugin (studio-plugin/) dependency manifest.
#
# Restored with `wally install` into Packages/ (git-ignored — see
# studio-plugin/.gitignore). `wally.lock` IS tracked so builds are
# reproducible (per REFACTOR_PLAN §7.1 Q2).
#
# Versions match BuilderTool's reference manifest. We omit ReactSpring — the
# plugin's animation surface (the pulse dot) is small enough to drive from
# `useEffect`/Heartbeat without a tweening dependency.

[package]
name = "mcpplugin/mcpplugin"
version = "0.1.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"

[dependencies]
React = "jsdotlua/react@17.1.0"
ReactRoblox = "jsdotlua/react-roblox@17.1.0"
Janitor = "howmanysmall/janitor@1.18.1"
